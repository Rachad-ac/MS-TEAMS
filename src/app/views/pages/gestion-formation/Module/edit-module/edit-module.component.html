<section>   
    <form [formGroup]="form">
      <div class="row">
        <div class="col-sm-6">
          <div class="mb-3"> 
            <label for="titre" class="form-label">titre<small style="color: red;">*</small></label>
            <input type="text" class="form-control form-control-lg" id="titre" placeholder="titre" formControlName="titre">
          </div>
        </div>
        <div class="col-sm-6">
            <div class="mb-3">
                <label for="ordre" class="form-label">Ordre<small style="color: red;">*</small></label>
                <input type="number" class="form-control form-control-lg" id="ordre" placeholder="Ordre" formControlName="ordre">
            </div>
        </div>
    </div>
   
    </form>
  
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" (click)="close()">Fermer</button>
      <button type="button" class="btn btn-primary" (click)="update()" [disabled]="!form.valid">Enregistrer</button>
    </div>
  </section>
