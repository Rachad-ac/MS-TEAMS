<!-- EN-TÊTE AVEC BREADCRUMB ET BOUTONS -->
<div class="d-flex justify-content-between align-items-center flex-wrap grid-margin mb-1">
  <nav class="page-breadcrumb cursor-pointer">
    <ol class="breadcrumb mb-0">
      <li class="breadcrumb-item active"><a>Liste des Tests</a></li>
    </ol>
  </nav>

  <div class="d-flex justify-content-end align-items-center gap-2">
    <button type="button" class="btn btn-secondary btn-icon me-2" (click)="openAddTest(SearchTestModal)">
      <i class="feather icon-search"></i>
    </button>
    <button type="button" class="btn btn-primary btn-icon-text" (click)="openAddTest(addTestModal)">
      <i class="feather icon-plus-circle"></i> Nouveau Test
    </button>
  </div>
</div>

<!-- TABLEAU DES CANDIDATS -->
<div class="card mt-4">
  <div class="card-body p-0">
    <section class="table-container mat-elevation-z8" tabindex="0">

      <table mat-table [dataSource]="dataSource?.payload">

        <ng-container matColumnDef="type">
          <th mat-header-cell *matHeaderCellDef class="table-head-text">Type</th>
          <td mat-cell *matCellDef="let test">{{ test?.type }}</td>
        </ng-container>

        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef class="table-head-text text-center">Date</th>
          <td mat-cell *matCellDef="let test" class="text-center">{{ test?.date | date }}</td>
        </ng-container>

        <ng-container matColumnDef="bareme">
          <th mat-header-cell *matHeaderCellDef class="table-head-text">Barème</th>
          <td mat-cell *matCellDef="let test">{{ test?.bareme }}</td>
        </ng-container>

        <ng-container matColumnDef="formation">
          <th mat-header-cell *matHeaderCellDef class="table-head-text text-center" style="min-width:50px;">Formation</th>
          <td mat-cell *matCellDef="let test" class="text-center"> {{test?.formation?.titre}} </td>
        </ng-container>


        <ng-container matColumnDef="actions" stickyEnd>
          <th mat-header-cell *matHeaderCellDef class="table-head-text">Actions</th>
          <td mat-cell *matCellDef="let test">
            <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Menu d'actions">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #menu="matMenu">
              <button mat-menu-item (click)="openEditTest(EditTestModal, test)">
                <mat-icon>edit</mat-icon>
                <span>Modifier</span>
              </button>
              <button mat-menu-item (click)="deleteTest(test.id)">
                <mat-icon>delete</mat-icon>
                <span>Supprimer</span>
              </button>
            </mat-menu>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true" class="table-head-bg"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>

      <span *ngIf="dataSource?.payload?.length === 0" class="paginate text-danger mt-4">
        Les critères de recherche ne correspondent à aucun test
      </span>

      <div class="paginate">
        <ngb-pagination 
          [collectionSize]="dataSource?.metadata?.totalElements"
          [page]="pageOptions.page + 1"
          [pageSize]="pageOptions.size"
          [maxSize]="5"
          (pageChange)="paginate($event)"
          size="sm"
          [rotate]="true"
          [ellipses]="true"
          [boundaryLinks]="true">
        </ngb-pagination>
      </div>
    </section>
  </div>
</div>

<!-- MODALE : Recherche Test -->
<ng-template #SearchTestModal let-modal>
  <div class="modal-header">
    <h5 class="modal-title" id="exampleModalLabel">Recherche Test</h5>
    <button type="button" class="btn-close"  (click)="modal.close('by: close icon')" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <app-add-test (search)="doSearch($event)" [isSearch]="true" (submit)="close()"></app-add-test>
  </div>
</ng-template>

<!-- MODALE : Nouveau Test -->
<ng-template #addTestModal let-modal>
  <div class="modal-header">
    <h5 class="modal-title" id="addTestModalLabel">Ajouter Test</h5>
    <button type="button" class="btn-close" (click)="modal.close('by: close icon')" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <app-add-test [isSearch]="false" (submit)="close()"></app-add-test>
  </div>
</ng-template>

<!-- MODALE : Modifier Test -->
<ng-template #EditTestModal let-modal>
  <div class="modal-header">
    <h5 class="modal-title" id="addTestModalLabel">Modifier Test</h5>
    <button type="button" class="btn-close" (click)="modal.close('by: close icon')" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <app-edit-test (submit)="close()" [testToUpdate]="testToUpdate"></app-edit-test>
  </div>
</ng-template>
