<section>
  <form [formGroup]="form">
    <div class="row">

      <!-- note  -->
      <div class="col-sm-6">
        <div class="mb-3">
          <label for="note" class="form-label">Note</label>
          <input type="number" class="form-control form-control-lg" id="note" placeholder="note" formControlName="note">
        </div>
      </div>

      <!-- commentaire -->
      <div class="col-sm-6">
        <div class="mb-3">
          <label for="commentaire" class="form-label">Commentaire</label>
          <input type="text" class="form-control form-control-lg" id="commentaire" placeholder="Commentaire" formControlName="commentaire">
        </div>
      </div>

      <!-- evaluation id -->
      <div class="col-sm-6">
        <div class="mb-3">
          <label for="evaluationId" class="form-label">Evaluation<small style="color: red;">*</small></label>
          <ng-select
            [items]="evaluations"
            bindLabel="typeEvalutation"
            bindValue="id"
            placeholder="Sélectionner une evaluation..."
            formControlName="evaluationId">
          </ng-select>
        </div>
      </div>

      <!-- employe id-->
      <div class="col-sm-6">
        <div class="mb-3">
          <label for="employeId" class="form-label">Employe<small style="color: red;">*</small></label>
          <ng-select
            [items]="employe"
            bindLabel="fullName"
            bindValue="id"
            placeholder="Sélectionner un employe..."
            formControlName="employeId">
          </ng-select>
        </div>

      </div>
    </div>
  </form>

  <!-- Boutons -->
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="close()">Fermer</button>
    <button type="button" class="btn btn-primary" *ngIf="!isSearch" (click)="create()" [disabled]="!form.valid">Enregistrer</button>
    <button type="button" class="btn btn-primary" *ngIf="isSearch" (click)="doSearch()">Rechercher</button>
  </div>
</section>
