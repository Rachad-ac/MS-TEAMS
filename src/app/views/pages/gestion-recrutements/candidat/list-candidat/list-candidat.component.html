<!-- TABLEAU DES CANDIDATS -->
<div class="card mt-4">
  <div class="card-body p-0">
    <section class="table-container mat-elevation-z8" tabindex="0">

      <table mat-table [dataSource]="dataSource?.payload">

        <ng-container matColumnDef="nom">
          <th mat-header-cell *matHeaderCellDef class="table-head-text">Nom</th>
          <td mat-cell *matCellDef="let candidat">{{ candidat?.nom }}</td>
        </ng-container>

        <ng-container matColumnDef="prenom">
          <th mat-header-cell *matHeaderCellDef class="table-head-text text-center">Prénom</th>
          <td mat-cell *matCellDef="let candidat" class="text-center">{{ candidat?.prenom }}</td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef class="table-head-text text-center">Email</th>
          <td mat-cell *matCellDef="let candidat" class="text-center">{{ candidat?.email }}</td>
        </ng-container>

        <ng-container matColumnDef="infos">
          <th mat-header-cell *matHeaderCellDef class="table-head-text text-center" style="min-width:50px;">
            Plus d'infos
          </th>
          <td mat-cell *matCellDef="let recrutement" class="text-center">
            <button class="btn btn-outline-secondary pb-0 px-3 pt-1" (click)="saveIdCandidat(recrutement.id)" [routerLink]="['/admin/gestion-recrutement/infos-candidat']">
              <mat-icon class="m-0">assignment</mat-icon>
            </button>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions" stickyEnd>
          <th mat-header-cell *matHeaderCellDef class="table-head-text">Actions</th>
          <td mat-cell *matCellDef="let candidat">
            <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Menu d'actions">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #menu="matMenu">
              <button mat-menu-item (click)="openEditCandidat(EditCandidatModal, candidat)">
                <mat-icon>edit</mat-icon>
                <span>Modifier</span>
              </button>
              <button mat-menu-item (click)="deleteCandidat(candidat.id)">
                <mat-icon>delete</mat-icon>
                <span>Supprimer</span>
              </button>
            </mat-menu>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true" class="table-head-bg"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>

      <span *ngIf="dataSource?.payload?.length === 0" class="paginate text-danger mt-4">
        Les critères de recherche ne correspondent à aucune évaluation
      </span>

      <div class="paginate">
        <ngb-pagination
          [collectionSize]="dataSource?.metadata?.totalElements"
          [page]="pageOptions.page + 1"
          [pageSize]="pageOptions.size"
          [maxSize]="5"
          (pageChange)="paginate($event)"
          size="sm"
          [rotate]="true"
          [ellipses]="true"
          [boundaryLinks]="true">
        </ngb-pagination>
      </div>
    </section>
  </div>
</div>

<!-- MODALE : Recherche candidat -->
<ng-template #SearchCandidatModal let-modal>
  <div class="modal-header">
    <h5 class="modal-title" id="exampleModalLabel">Recherche Candidat</h5>
    <button type="button" class="btn-close"  (click)="modal.close('by: close icon')" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <app-add-candidat (search)="doSearch($event)" [isSearch]="true" (submit)="close()"></app-add-candidat>
  </div>
</ng-template>

<!-- MODALE : Modifier Candidat -->
<ng-template #EditCandidatModal let-modal>
  <div class="modal-header">
    <h5 class="modal-title" id="addCandidatModalLabel">Modifier Candidat</h5>
    <button type="button" class="btn-close" (click)="modal.close('by: close icon')" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <app-edit-candidat (submit)="close()" [candidatToUpdate]="candidatToUpdate"></app-edit-candidat>
  </div>
</ng-template>
