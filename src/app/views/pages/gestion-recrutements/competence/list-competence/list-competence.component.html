<div class="d-flex justify-content-between align-items-center flex-wrap grid-margin mb-1">

  <!-- Breadcrumb à gauche -->
  <nav class="page-breadcrumb cursor-pointer">
    <ol class="breadcrumb mb-0">
      <li class="breadcrumb-item active"><a>List Competence</a></li>
    </ol>
  </nav>

  <!-- Boutons à droite -->
  <div class="d-flex justify-content-end align-items-center gap-2">
    <button type="button" class="btn btn-secondary btn-icon me-2" (click)="openModal(SearchCompetenceModal, 'xl')">
      <i class="feather icon-search"></i>
    </button>
    <button type="button" class="btn btn-primary btn-icon-text" (click)="openModal(addcompetenceModal,'xl')">
      <i class="feather icon-plus-circle"></i> Nouvel Competence
    </button>
  </div>

</div>

<div class="card mt-4">
  <div class="card-body p-0">
    <section class="table-container mat-elevation-z8" tabindex="0">
      <!-- <app-spinner *ngIf="loadingIndicator" [displayedColumns]="displayedColumns"></app-spinner> -->

      <table mat-table [dataSource]="dataSource?.payload">

        <ng-container matColumnDef="nom">
          <th mat-header-cell *matHeaderCellDef class="table-head-text">Nom</th>
          <td mat-cell *matCellDef="let competence"> {{competence?.nom}} </td>
        </ng-container>

        <ng-container matColumnDef="niveau">
          <th mat-header-cell *matHeaderCellDef class="table-head-text">Niveau</th>
          <td mat-cell *matCellDef="let competence"> {{competence?.niveau}} </td>
        </ng-container>

        <ng-container matColumnDef="domaine">
          <th mat-header-cell *matHeaderCellDef class="table-head-text">Domaine</th>
          <td mat-cell *matCellDef="let competence"> {{competence?.domaine}} </td>
        </ng-container>

        <ng-container matColumnDef="actions" stickyEnd>
          <th mat-header-cell *matHeaderCellDef class="table-head-text">Actions</th>
          <td mat-cell *matCellDef="let competence">
            <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Menu d’actions">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #menu="matMenu">
              <button mat-menu-item (click)="openEditCompetence(EditCompetenceModal, competence)">
                <mat-icon>edit</mat-icon>
                <span>Modifier</span>
              </button>
              <button mat-menu-item (click)="deleteCompetence(competence.id)">
                <mat-icon>delete</mat-icon>
                <span>Supprimer</span>
              </button>
            </mat-menu>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true" class="table-head-bg"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

      </table>


      <span *ngIf="dataSource?.payload?.length == 0" class="paginate text-danger mt-4">Les critères de recherche
                tels qu'énoncés ne correspondent à aucun competence</span>

      <div class="paginate">
        <ngb-pagination [collectionSize]="dataSource?.metadata?.totalElements" [page]="pageOptions.page+1"
                        [pageSize]="pageOptions.size" [maxSize]="5" (pageChange)="paginate($event)" size="sm"
                        [rotate]="true" [ellipses]="true" [boundaryLinks]="true">
        </ngb-pagination>
      </div>
    </section>
  </div>
</div>

<!-- search competence -->
<ng-template #SearchCompetenceModal let-modal>
  <div class="modal-header">
    <h5 class="modal-title" id="exampleModalLabel">Recherche competence</h5>
    <button type="button" class="btn-close"  (click)="modal.close('by: close icon')" aria-label="Close"></button>
  </div>
  <div class="modal-body">
      <app-add-competence (search)="doSearch($event)" [isSearch]="true" (submit)="close()"></app-add-competence>
  </div>
</ng-template> 
<!-- search competence -->

<!--Add competence-->
<ng-template #addcompetenceModal let-modal>
  <div class="modal-header">
    <h5 class="modal-title" id="addcompetenceModalLabel">Ajout competence</h5>
    <button type="button" class="btn-close" (click)="modal.close('by: close icon')" aria-label="Close"></button>
  </div>
  <div class="modal-body">
      <app-add-competence [isSearch]="false" (submit)="close()"></app-add-competence>
  </div>
</ng-template>

<ng-template #SearchcompetenceModal let-modal>
  <div class="modal-header">
    <h5 class="modal-title" id="addcompetenceModalLabel">Ajout Competence</h5>
    <button type="button" class="btn-close" (click)="modal.close('by: close icon')" aria-label="Close"></button>
  </div>
  <div class="modal-body">
      <app-add-competence [isSearch]="true" (submit)="close()"></app-add-competence>
  </div>
</ng-template>
<!--End Add competence-->

<!--Edit competence-->
<ng-template #EditCompetenceModal let-modal>
  <div class="modal-header">
    <h5 class="modal-title" id="EditCompetenceModalLabel">Modifier Competence</h5>
    <button type="button" class="btn-close" (click)="modal.close('by: close icon')" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <app-add-competence [isSearch]="false"  (submit)="close()" [competenceToUpdate]="competenceToUpdate"></app-add-competence>
  </div>
</ng-template>
<!--End Edit competence-->
