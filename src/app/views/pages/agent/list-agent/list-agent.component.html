<div class="d-flex justify-content-between align-items-center flex-wrap grid-margin mb-1">

    <!-- Breadcrumb à gauche -->
    <nav class="page-breadcrumb cursor-pointer">
        <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item active"><a>List agent</a></li>
        </ol>
    </nav>

    <!-- Boutons à droite -->
    <div class="d-flex justify-content-end align-items-center gap-2">
        <button type="button" class="btn btn-secondary btn-icon me-2" (click)="openAddAgent(SearchAgentModal)">
            <i class="feather icon-search"></i>
        </button>
        <button type="button" class="btn btn-primary btn-icon-text" (click)="openAddAgent(addAgentModal)">
            <i class="feather icon-plus-circle"></i> Nouvel agent
        </button>
    </div>

</div>

<div class="card mt-4">
    <div class="card-body p-0">
        <section class="table-container mat-elevation-z8" tabindex="0">
            <!-- <app-spinner *ngIf="loadingIndicator" [displayedColumns]="displayedColumns"></app-spinner> -->

            <table mat-table [dataSource]="dataSource?.payload">
                <ng-container matColumnDef="prenom">
                    <th mat-header-cell *matHeaderCellDef class="table-head-text" style="min-width:100px;"> Prenom </th>
                    <td mat-cell *matCellDef="let agent" class="text-left"> {{agent?.lastName}} </td>
                </ng-container>

                <ng-container matColumnDef="nom">
                    <th mat-header-cell *matHeaderCellDef class="table-head-text text" style="min-width:100px;">
                        Nom </th>
                    <td mat-cell *matCellDef="let agent" class="text-left"> <span>{{agent?.name}} </span>
                    </td>
                </ng-container>

                <ng-container matColumnDef="address">
                    <th mat-header-cell *matHeaderCellDef class="table-head-text text-center" style="min-width:50px;">
                        adresse </th>
                    <td mat-cell *matCellDef="let agent" class="text-center"> {{agent?.address}} </td>
                </ng-container>

                <ng-container matColumnDef="dni">
                    <th mat-header-cell *matHeaderCellDef class="table-head-text text-center" style="min-width:50px;">
                        Date Naissance </th>
                    <td mat-cell *matCellDef="let agent" class="text-center"> {{agent?.dni}} </td>
                </ng-container>
                <ng-container matColumnDef="sexe">
                    <th mat-header-cell *matHeaderCellDef class="table-head-text text-center" style="min-width:50px;">
                        sexe </th>
                    <td mat-cell *matCellDef="let agent" class="text-center"> {{agent?.sexe?.description}} </td>
                </ng-container>

                <ng-container matColumnDef="actions" stickyEnd>
                    <th mat-header-cell *matHeaderCellDef class="table-head-text" style="min-width:0px;">
                        Actions </th>
                    <td mat-cell *matCellDef="let agent">
                        <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Example icon-button with a menu">
                            <mat-icon>more_vert</mat-icon>
                        </button>
                        <mat-menu #menu="matMenu">
                            <button mat-menu-item (click)="openEditAgent(EditAgentModal, agent)">
                                <mat-icon>edit</mat-icon>
                                <span>Modifier</span>
                            </button>
                            <button mat-menu-item (click)="deleteAgent(agent.id)">
                                <mat-icon>delete</mat-icon>
                                <span>Supprimer</span>
                            </button>
                        </mat-menu>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true" class="table-head-bg"></tr>
                <tr mat-row *matRowDef="let emprow; columns: displayedColumns"></tr>
            </table>

            <span *ngIf="dataSource?.payload?.length == 0" class="paginate text-danger mt-4">Les critères de recherche
                tels qu'énoncés ne correspondent à aucun agent</span>

            <div class="paginate">
                <ngb-pagination [collectionSize]="dataSource?.metadata?.totalElements" [page]="pageOptions.page+1"
                    [pageSize]="pageOptions.size" [maxSize]="5" (pageChange)="paginate($event)" size="sm"
                    [rotate]="true" [ellipses]="true" [boundaryLinks]="true">
                </ngb-pagination>
            </div>
        </section>
    </div>
</div>
<!-- search agent -->
<ng-template #SearchAgentModal let-modal>
    <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLabel">Recherche Agent</h5>
        <button type="button" class="btn-close"  (click)="modal.close('by: close icon')" aria-label="Close"></button>
    </div>
    <div class="modal-body">
        <app-add-agent (search)="doSearch($event)" [isSearch]="true" (submit)="close()"></app-add-agent>
    </div>
</ng-template>
<!-- search agent -->

<!--Add agent-->
<ng-template #addAgentModal let-modal>
    <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLabel">Ajout Agent</h5>
        <button type="button" class="btn-close" (click)="modal.close('by: close icon')" aria-label="Close"></button>
    </div>
    <div class="modal-body">
        <app-add-agent [isSearch]="false" (submit)="close()"></app-add-agent>
    </div>
</ng-template>
<!--End Add agent-->

<!--Edit agent-->
<ng-template #EditAgentModal let-modal>
    <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLabel">Modifier Agent</h5>
        <button type="button" class="btn-close" (click)="modal.close('by: close icon')" aria-label="Close"></button>
    </div>
    <div class="modal-body">
        <app-edit-agent  (submit)="close()"[agentToUpdate]="agentToUpdate"></app-edit-agent>
    </div> 
</ng-template>
<!--End Edit agent-->
