# Configuration du serveur
server:
  port: 2001 # Port sur lequel l'application sera accessible
  servlet:
    context-path: /api-webService # Préfixe de contexte pour toutes les URLs

# Configuration Spring
spring:
  # Configuration de la base de données
  datasource:
    name: ${DB_NAME:talent-management-db} # Nom de la base de données (variable d'environnement ou valeur par défaut)
    host: ${DB_HOST:127.0.0.1} # Hôte de la base de données
    username: ${DB_USERNAME:root} # Nom d'utilisateur MySQL
    password: ${DB_PASSWORD:} # Mot de passe MySQL (vide par défaut)
    driver-class-name: com.mysql.cj.jdbc.Driver # Driver JDBC pour MySQL
    url: jdbc:mysql://${spring.datasource.host}:3306/${spring.datasource.name}?createDatabaseIfNotExist=true # URL de connexion avec création automatique de la DB

  # Configuration JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: update # Mise à jour automatique du schéma de la base de données
    show-sql: true # Affichage des requêtes SQL dans les logs
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect # Dialecte Hibernate pour MySQL 8

  # Configuration de l'application
  application:
    name: projet # Nom de l'application

  # Configuration de la documentation API (Swagger/OpenAPI)
  springdoc:
    api-docs:
      enabled: true # Activation de la documentation OpenAPI
      path: /v3/api-docs # Chemin vers la documentation JSON
    swagger-ui:
      enabled: true # Activation de l'interface Swagger UI
      path: /swagger-ui.html # Chemin vers l'interface Swagger