<!-- EN-TÊTE AVEC BREADCRUMB ET BOUTONS -->
<div class="d-flex justify-content-between align-items-center flex-wrap grid-margin mb-1">
  <nav class="page-breadcrumb cursor-pointer">
    <ol class="breadcrumb mb-0">
      <li class="breadcrumb-item active"><a>Liste des niveaux etudes</a></li>
    </ol>
  </nav>

  <div class="d-flex justify-content-end align-items-center gap-2">
    <button type="button" class="btn btn-secondary btn-icon me-2" (click)="openAddNiveauEtude(SearchNiveauEtudeModal)">
      <i class="feather icon-search"></i>
    </button>
    <button type="button" class="btn btn-primary btn-icon-text" (click)="openAddNiveauEtude(addNiveauEtudeModal)">
      <i class="feather icon-plus-circle"></i> Nouveau niveau etude
    </button>
  </div>
</div>

<div class="card mt-4">
  <div class="card-body p-0">
    <section class="table-container mat-elevation-z8" tabindex="0">

      <table mat-table [dataSource]="dataSource?.payload">

        <ng-container matColumnDef="nom">
          <th mat-header-cell *matHeaderCellDef class="table-head-text">nom</th>
          <td mat-cell *matCellDef="let niveauEtude">{{ niveauEtude?.nom}}</td>
        </ng-container>

        <ng-container matColumnDef="commentaire">
          <th mat-header-cell *matHeaderCellDef class="table-head-text">Commentaire</th>
          <td mat-cell *matCellDef="let niveauEtude">{{ niveauEtude?.commentaire }}</td>
        </ng-container>


        <ng-container matColumnDef="actions" stickyEnd>
          <th mat-header-cell *matHeaderCellDef class="table-head-text">Actions</th>
          <td mat-cell *matCellDef="let niveauEtude">
            <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Menu d’actions">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #menu="matMenu">
              <button mat-menu-item (click)="openEditNiveauEtude(EditNiveauEtudeModal, niveauEtude)">
                <mat-icon>edit</mat-icon>
                <span>Modifier</span>
              </button>
              <button mat-menu-item (click)="deleteNiveauEtude(niveauEtude)">
                <mat-icon>delete</mat-icon>
                <span>Supprimer</span>
              </button>
            </mat-menu>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true" class="table-head-bg"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>

      <span *ngIf="dataSource?.payload?.length === 0" class="paginate text-danger mt-4">
        Les critères de recherche ne correspondent à aucun niveau etude
      </span>

      <div class="paginate">
        <ngb-pagination
          [collectionSize]="dataSource?.metadata?.totalElements"
          [page]="pageOptions.page + 1"
          [pageSize]="pageOptions.size"
          [maxSize]="5"
          (pageChange)="paginate($event)"
          size="sm"
          [rotate]="true"
          [ellipses]="true"
          [boundaryLinks]="true">
        </ngb-pagination>
      </div>
    </section>
  </div>
</div>

<!-- MODALE : Recherche Niveau Etude-->
<ng-template #SearchNiveauEtudeModal let-modal>
  <div class="modal-header">
    <h5 class="modal-title" id="exampleModalLabel">Recherche Niveau Etude</h5>
    <button type="button" class="btn-close"  (click)="modal.close('by: close icon')" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <app-add-niveau-etude (search)="doSearch($event)" [isSearch]="true" (submit)="close()"></app-add-niveau-etude>
  </div>
</ng-template>

<!-- MODALE : add Niveau etude  -->
<ng-template #addNiveauEtudeModal let-modal>
  <div class="modal-header">
    <h5 class="modal-title" id="addNiveauEtudeModalModalLabel">Ajouter Niveau Etude</h5>
    <button type="button" class="btn-close" (click) = "modal.close('by: close icon')" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <app-add-niveau-etude [isSearch]="false" (submit)="close()"></app-add-niveau-etude>
  </div>
</ng-template>

<!-- MODALE : Modifier niveau etude-->
<ng-template #EditNiveauEtudeModal let-modal>
  <div class="modal-header">
    <h5 class="modal-title" id="editNiveauEtudeModalModalLabel">Modifier Niveau Etude</h5>
    <button type="button" class="btn-close" (click) = "modal.close('by: close icon')" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <app-add-niveau-etude (submit)="close()" [niveauEtudeToUpdate]="niveauEtudeToUpdate"></app-add-niveau-etude>
  </div>
</ng-template>
