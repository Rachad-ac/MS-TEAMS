<!-- EN-TÊTE AVEC BREADCRUMB ET BOUTONS -->
<div class="d-flex justify-content-between align-items-center flex-wrap grid-margin mb-1">
  <nav class="page-breadcrumb cursor-pointer">
    <ol class="breadcrumb mb-0">
      <li class="breadcrumb-item active"><a>Liste des Modules</a></li>
    </ol>
  </nav>

  <div class="d-flex justify-content-end align-items-center gap-2">
    <button type="button" class="btn btn-secondary btn-icon me-2" (click)="openAddModule(SearchModuleModal)">
      <i class="feather icon-search"></i>
    </button>
    <button type="button" class="btn btn-primary btn-icon-text" (click)="openAddModule(addModuleModal)">
      <i class="feather icon-plus-circle"></i> Nouveau Module
    </button>
  </div>
</div>

<!-- TABLEAU DES CANDIDATS -->
<div class="card mt-4">
  <div class="card-body p-0">
    <section class="table-container mat-elevation-z8" tabindex="0">

      <table mat-table [dataSource]="dataSource?.payload">

        <ng-container matColumnDef="titre">
          <th mat-header-cell *matHeaderCellDef class="table-head-text">Titre</th>
          <td mat-cell *matCellDef="let module">{{ module?.titre }}</td>
        </ng-container>

        <ng-container matColumnDef="ordre">
          <th mat-header-cell *matHeaderCellDef class="table-head-text text-center">Ordre</th>
          <td mat-cell *matCellDef="let module" class="text-center">{{ module?.ordre }}</td>
        </ng-container>

        <ng-container matColumnDef="formation">
          <th mat-header-cell *matHeaderCellDef class="table-head-text text-center" style="min-width:50px;">Formation</th>
          <td mat-cell *matCellDef="let module" class="text-center"> {{module?.formation?.titre}} </td>
        </ng-container>


        <ng-container matColumnDef="actions" stickyEnd>
          <th mat-header-cell *matHeaderCellDef class="table-head-text">Actions</th>
          <td mat-cell *matCellDef="let module">
            <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Menu d'actions">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #menu="matMenu">
              <button mat-menu-item (click)="openEditModule(EditModuleModal, module)">
                <mat-icon>edit</mat-icon>
                <span>Modifier</span>
              </button>
              <button mat-menu-item (click)="deleteModule(module.id)">
                <mat-icon>delete</mat-icon>
                <span>Supprimer</span>
              </button>
            </mat-menu>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true" class="table-head-bg"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>

      <span *ngIf="dataSource?.payload?.length === 0" class="paginate text-danger mt-4">
        Les critères de recherche ne correspondent à aucun module
      </span>

      <div class="paginate">
        <ngb-pagination 
          [collectionSize]="dataSource?.metadata?.totalElements"
          [page]="pageOptions.page + 1"
          [pageSize]="pageOptions.size"
          [maxSize]="5"
          (pageChange)="paginate($event)"
          size="sm"
          [rotate]="true"
          [ellipses]="true"
          [boundaryLinks]="true">
        </ngb-pagination>
      </div>
    </section>
  </div>
</div>

<!-- MODALE : Recherche module -->
<ng-template #SearchModuleModal let-modal>
  <div class="modal-header">
    <h5 class="modal-title" id="exampleModalLabel">Recherche Module</h5>
    <button type="button" class="btn-close"  (click)="modal.close('by: close icon')" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <app-add-module (search)="doSearch($event)" [isSearch]="true" (submit)="close()"></app-add-module>
  </div>
</ng-template>

<!-- MODALE : Nouvelle Module -->
<ng-template #addModuleModal let-modal>
  <div class="modal-header">
    <h5 class="modal-title" id="addModuleModalLabel">Ajouter Module</h5>
    <button type="button" class="btn-close" (click)="modal.close('by: close icon')" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <app-add-module [isSearch]="false" (submit)="close()"></app-add-module>
  </div>
</ng-template>

<!-- MODALE : Modifier Module -->
<ng-template #EditModuleModal let-modal>
  <div class="modal-header">
    <h5 class="modal-title" id="addModuleModalLabel">Modifier Module</h5>
    <button type="button" class="btn-close" (click)="modal.close('by: close icon')" aria-label="Close"></button>
  </div>
  <div class="modal-body">
    <app-edit-module (submit)="close()" [moduleToUpdate]="moduleToUpdate"></app-edit-module>
  </div>
</ng-template>
