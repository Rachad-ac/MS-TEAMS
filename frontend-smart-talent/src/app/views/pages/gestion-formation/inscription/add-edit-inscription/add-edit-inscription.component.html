<form [formGroup]="inscriptionForm" (ngSubmit)="save()">
  <div class="form-group">
    <label>Employé</label>
    <select formControlName="employeId" class="form-control">
      <option value="" disabled selected>Choisir un employé</option>
      <option *ngFor="let emp of employes" [value]="emp.id">{{ emp.nom }} {{ emp.prenom }}</option>
    </select>
  </div>
  <div class="form-group">
    <label>Formation</label>
    <select formControlName="formationId" class="form-control">
      <option value="" disabled selected>Choisir une formation</option>
      <option *ngFor="let f of formations" [value]="f.id">{{ f.titre }}</option>
    </select>
  </div>
  <div class="form-group">
    <label>Date d'inscription</label>
    <input
      formControlName="dateInscription"
      class="form-control"
      type="datetime-local"
    />
  </div>
  <div class="form-group">
    <label>Statut</label>
    <input formControlName="statut" class="form-control" />
  </div>
  <div class="modal-footer">
    <button
      type="button"
      class="btn btn-secondary"
      (click)="activeModal.dismiss()"
    >
      Annuler
    </button>
    <button
      type="submit"
      class="btn btn-primary"
      [disabled]="inscriptionForm.invalid || loading"
    >
      {{ inscription ? "Modifier" : "Ajouter" }}
    </button>
  </div>
</form>
