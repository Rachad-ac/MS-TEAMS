<section>
  <form [formGroup]="form">
    <div class="row">

      <!-- presense -->
      <div class="col-sm-6">
        <div class="mb-3">
          <label  class="form-label">Statut <small style="color: red;">*</small></label>
          <ng-select
            [items]="statutPresence"
            bindValue="value"
            placeholder="Selectionner..."
            formControlName="statutPresence">
          </ng-select>
        </div>
      </div>

      <!-- justification -->
      <div class="col-sm-6">
        <div class="mb-3">
          <label for="justification" class="form-label">Justification</label>
          <input type="text" class="form-control form-control-lg" id="justification" placeholder="justification" formControlName="justification">
        </div>
      </div>

      <!-- session formation -->
      <div class="col-sm-6">
        <div class="mb-3">
          <label for="sessionFormationId" class="form-label">Session Formation<small style="color: red;"> *</small></label>
          <ng-select
            [items]="sessionFormation"
            bindLabel="session"
            bindValue="id"
            placeholder="Sélectionner uns session de formation..."
            formControlName="sessionFormationId">
          </ng-select>
        </div>
      </div>

      <!-- employe -->
      <div class="col-sm-6">
        <div class="mb-3">
          <label for="employeId" class="form-label">Employe<small style="color: red;"> *</small></label>
          <ng-select
            [items]="employe"
            bindLabel="fullName"
            bindValue="id"
            placeholder="Sélectionner un employe..."
            formControlName="employeId">
          </ng-select>
        </div>

      </div>
    </div>

  </form>

  <!-- Boutons -->
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="close()">Fermer</button>
    <button type="button" class="btn btn-primary" *ngIf="!isSearch" (click)="create()" [disabled]="!form.valid">Enregistrer</button>
    <button type="button" class="btn btn-primary" *ngIf="isSearch" (click)="doSearch()">Rechercher</button>
  </div>
</section>
